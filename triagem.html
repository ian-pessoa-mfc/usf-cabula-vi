<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Triagem</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }

        h1 {
            margin-bottom: 20px;
        }

        #pergunta {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #opcoes button {
            display: block;
            margin: 8px 0;
            padding: 10px;
            width: 100%;
            max-width: 300px;
            font-size: 1rem;
            cursor: pointer;
        }

        #resultado {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            display: none;
        }
    </style>
</head>

<body>
    <h1>Assistente de Triagem</h1>

    <div id="pergunta"></div>
    <div id="opcoes"></div>
    <div id="resultado"></div>

    <script src="script.js"></script>
</body>
</html>
