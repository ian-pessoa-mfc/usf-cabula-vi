<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triagem - USF Cabula VI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    USF Cabula VI
    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="about.html">A Unidade</a></li>
            <li><a href="triagem.html">Triagem</a></li>
            <li><a href="contact.html">Contato</a></li>
        </ul>
    </nav>
</header>

<div class="container">

    <h2 class="section-title">Sistema de Triagem</h2>

    <div class="section">
        <label class="section-title">Profissional</label>
        <input id="profissional" type="text" placeholder="Seu nome">
    </div>

    <div class="section">
        <label class="section-title">Queixa principal</label>
        <select id="queixa" onchange="mostrarCondicionais()">
            <option value="">Selecione...</option>

            <option value="convulsao">Convulsão</option>
            <option value="desmaio">Desmaio / Síncope</option>
            <option value="dorToracica">Dor torácica</option>
            <option value="dispneia">Falta de ar</option>
            <option value="hemorragia">Hemorragia</option>

            <option value="febre">Febre</option>
            <option value="vomito">Vômito</option>
            <option value="diarreia">Diarreia</option>
            <option value="cefaleia">Cefaleia</option>
            <option value="tontura">Tontura</option>
            <option value="malEstar">Mal-estar</option>
            <option value="dor">Dor inespecífica</option>

            <option value="trauma">Trauma</option>
            <option value="alergia">Alergia</option>
            <option value="hiperglicemia">Hiperglicemia</option>
            <option value="hipoglicemia">Hipoglicemia</option>

            <option value="outro">Outro</option>
        </select>

        <div id="condicionais"></div>
    </div>

    <div class="section">
        <label class="section-title">Sinais vitais</label>

        <input id="fc" type="number" placeholder="Frequência cardíaca">
        <input id="fr" type="number" placeholder="Frequência respiratória">
        <input id="spo2" type="number" placeholder="SpO2 (%)">
        <input id="pas" type="number" placeholder="Pressão sistólica">
        <input id="pad" type="number" placeholder="Pressão diastólica">
    </div>

    <div class="vaga-buttons">
        <button onclick="definirVaga(true)">Há vaga no acolhimento</button>
        <button onclick="definirVaga(false)">Não há vaga</button>
    </div>

    <button onclick="gerarResumo()">Gerar classificação</button>

    <div id="resultado" class="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
