<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triagem - USF Cabula VI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>USF Cabula VI</h1>
    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="about.html">A Unidade</a></li>
            <li><a href="triagem.html">Triagem</a></li>
            <li><a href="contact.html">Contato</a></li>
        </ul>
    </nav>
</header>

<div class="container">

    <h2>Sistema de Triagem</h2>

    <div class="section">
        <h3>Identificação do Profissional</h3>
        <input id="profissional" type="text" placeholder="Nome do profissional">
    </div>

    <div class="section">
        <h3>Queixa principal</h3>
        <select id="queixa" onchange="mostrarCondicionais()">
            <option value="">Selecione...</option>

            <option value="convulsao">Convulsão</option>
            <option value="desmaio">Desmaio / Síncope</option>
            <option value="dorToracica">Dor torácica</option>
            <option value="dispneia">Falta de ar</option>
            <option value="hemorragia">Hemorragia / Sangramento</option>

            <option value="febre">Febre</option>
            <option value="vomito">Vômito</option>
            <option value="diarreia">Diarreia</option>
            <option value="cefaleia">Cefaleia / Dor de cabeça</option>
            <option value="tontura">Tontura</option>
            <option value="malEstar">Mal-estar</option>
            <option value="dor">Dor inespecífica</option>

            <option value="trauma">Trauma / Queda</option>
            <option value="alergia">Alergia / Reação alérgica</option>
            <option value="gestante">Gestante (queixa clínica)</option>
            <option value="psiquiatrico">Alteração comportamental</option>
            <option value="hiperglicemia">Hiperglicemia</option>
            <option value="hipoglicemia">Hipoglicemia</option>

            <option value="outro">Outro</option>
        </select>

        <div id="condicionais"></div>
    </div>

    <div class="section">
        <h3>Sinais vitais</h3>

        <input id="temperatura" type="number" step="0.1" placeholder="Temperatura (°C)">
        <input id="fc" type="number" placeholder="Frequência cardíaca">
        <input id="fr" type="number" placeholder="Frequência respiratória">
        <input id="spo2" type="number" placeholder="SpO2 (%)">
        <input id="pas" type="number" placeholder="Pressão sistólica">
        <input id="pad" type="number" placeholder="Pressão diastólica">

        <div id="alertas"></div>
    </div>

    <div class="vaga-box">
        <p>Há vaga no acolhimento?</p>
        <button onclick="definirVaga(true)">SIM</button>
        <button onclick="definirVaga(false)">NÃO</button>
    </div>

    <button onclick="gerarResumo()">Gerar Classificação</button>

    <div id="resultado" class="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
